name: OEM GSI Builder (Optimized)

on:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout (latest)
        uses: actions/checkout@v4

      - name: Load Configuration
        uses: falti/dotenv-action@v1.0.0
        id: config
        with:
          path: config.env

      - name: Check Configuration
        run: |
          required() { if [[ -z "$1" ]]; then echo "$2 variable can't be null." && exit 1; fi }
          required "${{ steps.config.outputs.url }}" "URL config"
          required "${{ steps.config.outputs.firmware_type }}" "FIRMWARE_TYPE config"
          required "${{ steps.config.outputs.output_type }}" "OUTPUT_TYPE config"

      - name: Normalize firmware type
        id: normalize
        run: |
          type="${{ steps.config.outputs.firmware_type }}"
          # Case-insensitive mapping to the correct ErfanGSIs ROM name
          case "${type,,}" in
            generic)      normalized="Generic" ;;
            miui)         normalized="MIUI" ;;
            pixel)        normalized="Pixel" ;;
            oxygenos)     normalized="OxygenOS" ;;
            oneui)        normalized="OneUI" ;;
            flyme)        normalized="Flyme" ;;
            coloros)      normalized="ColorOS" ;;
            moto)         normalized="Moto" ;;
            nubia)        normalized="Nubia" ;;
            xperia)       normalized="Xperia" ;;
            zui)          normalized="ZUI" ;;
            zenui)        normalized="ZenUI" ;;
            *)            normalized="$type" ;;  # fallback for any other
          esac
          echo "original=$type" >> $GITHUB_OUTPUT
          echo "normalized=$normalized" >> $GITHUB_OUTPUT
          echo "Using normalized firmware type: $normalized"

      - name: Cache ErfanGSIs tools
        id: cache-erfan
        uses: actions/cache@v4
        with:
          path: ErfanGSIs
          key: erfan-gsi-${{ hashFiles('config.env') }}-${{ github.run_id }}
          restore-keys: |
            erfan-gsi-
            erfan-gsi

      - name: Setup ErfanGSIs Tools
        if: steps.cache-erfan.outputs.cache-hit != 'true'
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip
          pip3 install --upgrade pip
          git clone --recurse-submodules --depth 1 "${{ steps.config.outputs.tool_repo || 'https://github.com/erfanoabdi/ErfanGSIs' }}"
          bash ErfanGSIs/setup.sh
          sed -i '$d' ErfanGSIs/url2GSI.sh

      - name: Build GSI
        run: |
          sudo ./ErfanGSIs/url2GSI.sh "${{ steps.config.outputs.url }}" \
            "${{ steps.normalize.outputs.normalized }}" \
            ${{ steps.config.outputs.output_type == 'ab' && '--ab' || (steps.config.outputs.output_type == 'a' && '--aonly' || '') }} \
            ${{ steps.config.outputs.extra_args }}

      - name: Prepare artifacts
        run: |
          mkdir -p build/
          if ls ErfanGSIs/output/*.img 1> /dev/null 2>&1; then
            sudo mv ErfanGSIs/output/*.img build/
            sudo gzip -r build/
            sudo chown -R $USER:$USER build/
          fi
          if ls ErfanGSIs/output/*.txt 1> /dev/null 2>&1; then
            sudo mv ErfanGSIs/output/*.txt build/
            sudo chown $USER:$USER build/*.txt
          fi

      - name: Upload to SourceForge (if needed)
        if: steps.config.outputs.sourceforge_dir != '0'
        env:
          SF_USERNAME: ${{ secrets.USERNAME }}
          SF_PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          sudo apt-get install -y sshpass
          ssh-keyscan frs.sourceforge.net >> ~/.ssh/known_hosts
          sshpass -p "$SF_PASSWORD" rsync -arsP -e ssh build/ "${SF_USERNAME}@frs.sourceforge.net:${{ steps.config.outputs.sourceforge_dir }}"

      - name: Upload artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: ErfanGSI-Output
          path: build/
          retention-days: 7
