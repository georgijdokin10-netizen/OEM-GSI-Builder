name: OEM GSI Builder (Optimized)

on:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      # ---------- Шаги со скриншота ----------
      - name: Set up job
        uses: actions/checkout@v4

      - name: Checkout (latest)
        uses: actions/checkout@v4

      - name: Load Configuration
        uses: falti/dotenv-action@v1.0.0
        id: config
        with:
          path: config.env

      - name: Check Configuration
        run: |
          required() { if [[ -z "$1" ]]; then echo "$2 variable can't be null." && exit 1; fi }
          required "${{ steps.config.outputs.url }}" "URL config"
          required "${{ steps.config.outputs.firmware_type }}" "FIRMWARE_TYPE config"
          required "${{ steps.config.outputs.output_type }}" "OUTPUT_TYPE config"

      - name: Normalize firmware type
        id: normalize
        run: |
          type="${{ steps.config.outputs.firmware_type }}"
          # Убираем версию, если есть (например, "Generic-10" -> "Generic")
          base="${type%%-*}"
          case "${base,,}" in
            generic)      norm="Generic" ;;
            miui)         norm="MIUI" ;;
            pixel)        norm="Pixel" ;;
            oxygenos)     norm="OxygenOS" ;;
            oneui)        norm="OneUI" ;;
            flyme)        norm="Flyme" ;;
            coloros)      norm="ColorOS" ;;
            moto)         norm="Moto" ;;
            nubia)        norm="Nubia" ;;
            xperia)       norm="Xperia" ;;
            zui)          norm="ZUI" ;;
            zenui)        norm="ZenUI" ;;
            *)            norm="$base" ;;
          esac
          echo "norm=$norm" >> $GITHUB_OUTPUT
          echo "::notice::Firmware type normalized to: $norm"

      - name: Cache ErfanGSIs tools
        id: cache-erfan
        uses: actions/cache@v4
        with:
          path: ErfanGSIs
          key: erfan-gsi-${{ hashFiles('config.env') }}-${{ github.run_id }}
          restore-keys: |
            erfan-gsi-
            erfan-gsi

      - name: Setup ErfanGSIs Tools
        if: steps.cache-erfan.outputs.cache-hit != 'true'
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip
          pip3 install --upgrade pip
          git clone --recurse-submodules --depth 1 "${{ steps.config.outputs.tool_repo || 'https://github.com/erfanoabdi/ErfanGSIs' }}"
          bash ErfanGSIs/setup.sh
          # ⚠️ Не удаляем последнюю строку – она важна для работы!
          # sed -i '$d' ErfanGSIs/url2GSI.sh  ← ЗАКОММЕНТИРОВАНО / УДАЛЕНО

      - name: Build GSI
        run: |
          set -e   # останавливаемся при любой ошибке
          # Сборка флагов
          flags=""
          if [[ "${{ steps.config.outputs.output_type }}" == "ab" ]]; then
            flags="--ab"
          elif [[ "${{ steps.config.outputs.output_type }}" == "a" ]]; then
            flags="--aonly"
          fi
          if [[ -n "${{ steps.config.outputs.extra_args }}" ]]; then
            flags="$flags ${{ steps.config.outputs.extra_args }}"
          fi
          echo "Running: url2GSI.sh \"${{ steps.config.outputs.url }}\" \"${{ steps.normalize.outputs.norm }}\" $flags"
          sudo ./ErfanGSIs/url2GSI.sh "${{ steps.config.outputs.url }}" "${{ steps.normalize.outputs.norm }}" $flags

      - name: Prepare artifacts
        run: |
          mkdir -p build/
          if ls ErfanGSIs/output/*.img 1> /dev/null 2>&1; then
            sudo mv ErfanGSIs/output/*.img build/
            sudo gzip -r build/
            sudo chown -R $USER:$USER build/
          fi
          if ls ErfanGSIs/output/*.txt 1> /dev/null 2>&1; then
            sudo mv ErfanGSIs/output/*.txt build/
            sudo chown $USER:$USER build/*.txt
          fi

      - name: Upload to SourceForge (if needed)
        if: steps.config.outputs.sourceforge_dir != '0'
        env:
          SF_USERNAME: ${{ secrets.USERNAME }}
          SF_PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          sudo apt-get install -y sshpass
          ssh-keyscan frs.sourceforge.net >> ~/.ssh/known_hosts
          sshpass -p "$SF_PASSWORD" rsync -arsP -e ssh build/ "${SF_USERNAME}@frs.sourceforge.net:${{ steps.config.outputs.sourceforge_dir }}"

      - name: Upload artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: ErfanGSI-Output
          path: build/
          retention-days: 7

      # ------ Post-шаги (автоматические) ------
      # Post Cache ErfanGSIs tools
      # Post Checkout (latest)
