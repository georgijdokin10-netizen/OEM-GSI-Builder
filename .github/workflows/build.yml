name: OEM GSI Builder (Stable)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read configuration
        id: config
        run: |
          set -a
          source config.env
          echo "url=${url}" >> $GITHUB_OUTPUT
          echo "firmware_type=${firmware_type}" >> $GITHUB_OUTPUT
          echo "output_type=${output_type}" >> $GITHUB_OUTPUT
          echo "extra_args=${extra_args}" >> $GITHUB_OUTPUT
          echo "tool_repo=${tool_repo:-https://github.com/iamlooper/ErfanGSIs}" >> $GITHUB_OUTPUT
          echo "sourceforge_dir=${sourceforge_dir:-0}" >> $GITHUB_OUTPUT

          # Нормализация имени прошивки
          type="${firmware_type}"
          base="${type%%-*}"
          case "${base,,}" in
            generic)   norm="Generic" ;;
            miui)      norm="MIUI" ;;
            pixel)     norm="Pixel" ;;
            oxygenos)  norm="OxygenOS" ;;
            oneui)     norm="OneUI" ;;
            flyme)     norm="Flyme" ;;
            coloros)   norm="ColorOS" ;;
            moto)      norm="Moto" ;;
            nubia)     norm="Nubia" ;;
            xperia)    norm="Xperia" ;;
            zui)       norm="ZUI" ;;
            zenui)     norm="ZenUI" ;;
            *)         norm="$base" ;;
          esac
          echo "norm_firmware=$norm" >> $GITHUB_OUTPUT
          echo "::notice::Normalized firmware type: $norm"

      - name: Validate configuration
        run: |
          required() { if [[ -z "$1" ]]; then echo "ERROR: $2 is missing in config.env" && exit 1; fi }
          required "${{ steps.config.outputs.url }}" "url"
          required "${{ steps.config.outputs.firmware_type }}" "firmware_type"
          required "${{ steps.config.outputs.output_type }}" "output_type"
          required "${{ steps.config.outputs.tool_repo }}" "tool_repo"

      - name: Cache ErfanGSIs tools
        id: cache
        uses: actions/cache@v4
        with:
          path: ErfanGSIs
          key: erfan-gsi-${{ steps.config.outputs.tool_repo }}-${{ hashFiles('config.env') }}-v2

      - name: Install dependencies & clone tools
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip git
          pip3 install --upgrade pip
          git clone --recurse-submodules --depth 1 "${{ steps.config.outputs.tool_repo }}" ErfanGSIs
          cd ErfanGSIs
          bash setup.sh

      - name: Build GSI
        run: |
          set -e
          flags=""
          if [[ "${{ steps.config.outputs.output_type }}" == "ab" ]]; then
            flags="--ab"
          elif [[ "${{ steps.config.outputs.output_type }}" == "a" ]]; then
            flags="--aonly"
          fi
          extra="${{ steps.config.outputs.extra_args }}"
          [[ -n "$extra" ]] && flags="$flags $extra"

          echo "Starting build: ${{ steps.config.outputs.url }} ${{ steps.config.outputs.norm_firmware }} $flags"
          sudo ./ErfanGSIs/url2GSI.sh "${{ steps.config.outputs.url }}" "${{ steps.config.outputs.norm_firmware }}" $flags

      - name: Prepare artifacts
        run: |
          mkdir -p build/
          if ls ErfanGSIs/output/*.img 1>/dev/null 2>&1; then
            sudo mv ErfanGSIs/output/*.img build/
            sudo gzip -r build/
            sudo chown -R $(whoami):$(whoami) build/
          fi
          if ls ErfanGSIs/output/*.txt 1>/dev/null 2>&1; then
            sudo mv ErfanGSIs/output/*.txt build/
            sudo chown $(whoami):$(whoami) build/*.txt
          fi

      - name: Upload to SourceForge (if needed)
        if: steps.config.outputs.sourceforge_dir != '0'
        env:
          SF_USERNAME: ${{ secrets.USERNAME }}
          SF_PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          sudo apt-get install -y sshpass
          mkdir -p ~/.ssh
          ssh-keyscan frs.sourceforge.net >> ~/.ssh/known_hosts
          sshpass -p "$SF_PASSWORD" rsync -arsP -e ssh build/ "${SF_USERNAME}@frs.sourceforge.net:${{ steps.config.outputs.sourceforge_dir }}"

      - name: Upload artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: ErfanGSI-Output
          path: build/
          retention-days: 7
